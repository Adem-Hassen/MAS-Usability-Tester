<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, select { display: block; width: 100%; margin: 4px 0 12px; padding: 8px; box-sizing: border-box; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    button { width: 100%; padding: 14px; background: #28a745; color: white; border: none;
             font-size: 16px; cursor: pointer; margin-top: 12px; }
    .section { margin-bottom: 24px; }
    .required { color: red; }
  </style>
</head>
<body>
  <h1>Checkout</h1>

  <div class="section">
    <h2>Shipping</h2>
    <!-- Issue: inputs use placeholder only, no labels -->
    <input type="text" placeholder="First name *" id="fname">
    <input type="text" placeholder="Last name *" id="lname">
    <input type="text" placeholder="Address line 1 *" id="addr1">
    <input type="text" placeholder="Address line 2" id="addr2">
    <div class="row">
      <div><input type="text" placeholder="City *" id="city"></div>
      <div><input type="text" placeholder="ZIP *" id="zip"></div>
    </div>
    <!-- Issue: no default option hint -->
    <select id="country">
      <option value="">Country</option>
      <option>United States</option>
      <option>Canada</option>
      <option>United Kingdom</option>
    </select>
  </div>

  <div class="section">
    <h2>Payment</h2>
    <input type="text" placeholder="Card number *" id="card" maxlength="19">
    <div class="row">
      <div><input type="text" placeholder="MM/YY" id="expiry" maxlength="5"></div>
      <div><input type="text" placeholder="CVV" id="cvv" maxlength="4"></div>
    </div>
    <!-- Issue: no explanation of what CVV is -->
    <input type="text" placeholder="Name on card *" id="cardname">
  </div>

  <!-- Issue: no order summary before submit -->
  <!-- Issue: button gives no feedback on click -->
  <button onclick="placeOrder()">Place Order</button>

  <script>
    function placeOrder() {
      // no validation feedback
      alert('Order placed!');
    }
  </script>
</body>
</html>
